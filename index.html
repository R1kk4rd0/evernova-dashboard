<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evernova — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F9FC;--surface:#FFF;--surface2:#F3F4F6;--border:#E5E7EB;--border2:#D1D5DB;
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  --accent:#4F46E5;--accent-light:#EEF2FF;
  --green:#16A34A;--green-bg:#DCFCE7;--red:#DC2626;--red-bg:#FEE2E2;
  --amber:#D97706;--amber-bg:#FEF3C7;--blue:#2563EB;--blue-bg:#DBEAFE;
  --sidebar-w:220px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.logo-name{font-size:14px;font-weight:600}.logo-sub{font-size:11px;color:var(--text3)}
.sidebar-nav{padding:12px 10px;flex:1}
.nav-section{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);padding:0 8px;margin-bottom:4px;margin-top:16px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.1s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border)}
.conn-pill{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--surface2);border-radius:8px;cursor:pointer}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.conn-dot.live{background:var(--green)}.conn-dot.error{background:var(--red)}
.conn-text{font-size:11px;color:var(--text2);flex:1}.conn-link{font-size:11px;color:var(--accent);font-weight:500}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.topbar-right{display:flex;align-items:center;gap:8px}
.breadcrumb{font-size:13px;color:var(--text3);cursor:pointer}.breadcrumb:hover{color:var(--text2)}
.sep{color:var(--text3);margin:0 6px}
.btn-primary{background:var(--accent);border:none;color:#fff;font-size:13px;font-weight:500;padding:7px 14px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-primary:hover{opacity:0.88}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:13px;padding:7px 12px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:transparent;border:1px solid #FCA5A5;color:var(--red);font-size:13px;padding:7px 12px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif}
.content{padding:24px;flex:1}
.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:24px}
.kpi-row-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.kpi-label{font-size:13px;color:var(--text2);font-weight:500}
.kpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.kpi-icon svg{width:16px;height:16px}
.kpi-value{font-size:28px;font-weight:600;color:var(--text);letter-spacing:-0.02em}
.kpi-footer{display:flex;align-items:center;gap:6px;margin-top:4px}
.kpi-delta{font-size:12px;font-weight:500;padding:1px 6px;border-radius:4px}
.kpi-delta.pos{background:var(--green-bg);color:var(--green)}
.kpi-delta.neg{background:var(--red-bg);color:var(--red)}
.kpi-delta.neu{background:var(--amber-bg);color:var(--amber)}
.kpi-delta.inf{background:var(--blue-bg);color:var(--blue)}
.kpi-footer-label{font-size:12px;color:var(--text3)}
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;color:var(--text)}
.card-sub{font-size:12px;color:var(--text3);margin-top:2px}
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--text3);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.data-table td{padding:12px 12px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--surface2);cursor:pointer}
.td-name{font-size:13px;color:var(--text);font-weight:500}
.td-mono{font-size:13px;color:var(--text);font-weight:500}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-paid{background:var(--green-bg);color:var(--green)}
.b-pending{background:var(--amber-bg);color:var(--amber)}
.b-draft{background:var(--surface2);color:var(--text3)}
.b-overdue{background:var(--red-bg);color:var(--red)}
.b-active{background:var(--green-bg);color:var(--green)}
.b-paused{background:var(--amber-bg);color:var(--amber)}
.b-done{background:var(--surface2);color:var(--text3)}
.b-proposal{background:var(--blue-bg);color:var(--blue)}
.goal-item{margin-bottom:14px;cursor:pointer}
.goal-header{display:flex;justify-content:space-between;margin-bottom:6px}
.goal-label{font-size:13px;color:var(--text2);font-weight:500}
.goal-nums{font-size:12px;color:var(--text3)}
.goal-track{height:6px;background:var(--surface2);border-radius:3px}
.goal-fill{height:6px;border-radius:3px}
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.1s}
.client-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.client-card.selected{border-color:var(--accent);background:var(--accent-light)}
.client-stats{display:flex;gap:0;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.cstat{flex:1;text-align:center}
.cstat:not(:last-child){border-right:1px solid var(--border)}
.cstat-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.04em;font-weight:600}
.cstat-val{font-size:14px;font-weight:600;color:var(--text)}
.detail-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);cursor:pointer;margin-bottom:16px}
.detail-back:hover{color:var(--text2)}
.detail-name{font-size:22px;font-weight:600;color:var(--text)}
.detail-meta{font-size:13px;color:var(--text3);margin-top:3px}
.info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:16px}
.info-field{background:var(--surface2);border-radius:8px;padding:12px 14px}
.info-label{font-size:10px;color:var(--text3);margin-bottom:3px;letter-spacing:0.06em;text-transform:uppercase;font-weight:600}
.info-val{font-size:13px;color:var(--text);font-weight:500}
.notes-area{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px 12px;resize:vertical;min-height:80px;font-family:'Inter',sans-serif}
.notes-area::placeholder{color:var(--text3)}
.section-divider{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.project-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all 0.1s;margin-bottom:8px}
.project-row:hover{border-color:var(--border2);box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.project-name{font-size:14px;font-weight:600;color:var(--text)}
.project-client{font-size:12px;color:var(--text3);margin-top:2px}
.pstat-label{font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600;letter-spacing:0.04em}
.pstat-val{font-size:13px;font-weight:600}
.margin-pos{color:var(--green)}.margin-neg{color:var(--red)}.margin-neu{color:var(--amber)}
.prog-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.prog-track{flex:1;height:4px;background:var(--surface2);border-radius:2px}
.prog-fill{height:4px;border-radius:2px;background:var(--accent)}
.prog-pct{font-size:11px;color:var(--text3);min-width:30px;text-align:right;font-weight:500}
.proj-cost-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.proj-cost-row:last-child{border-bottom:none}
.margin-card{background:var(--surface2);border-radius:10px;padding:16px}
.margin-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.margin-divider{height:1px;background:var(--border);margin:10px 0}
.exp-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.exp-row:last-child{border-bottom:none}
.add-form{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.fi{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:7px 10px;border-radius:7px;font-family:'Inter',sans-serif;flex:1;min-width:110px}
.fi::placeholder{color:var(--text3)}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.recent-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.recent-item:last-child{border-bottom:none}
.recent-name{font-size:13px;font-weight:500;color:var(--text)}
.recent-sub{font-size:11px;color:var(--text3);margin-top:1px}
.recent-amt{font-size:14px;font-weight:600;color:var(--green);margin-left:auto}
/* Search */
.search-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap .search-input{width:100%;padding-right:28px}
.search-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;width:100%}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text3);font-size:18px;line-height:1;background:none;border:none;padding:0;display:none}
.search-clear.vis{display:block}.search-clear:hover{color:var(--text2)}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text2);font-family:'Inter',sans-serif;cursor:pointer;outline:none}
.results-count{font-size:12px;color:var(--text3);white-space:nowrap}
.filter-total{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--red);white-space:nowrap}
/* Pills */
.th-sort{cursor:pointer;user-select:none;white-space:nowrap}
.th-sort:hover{color:var(--text)}
.sort-arrow{margin-left:4px;opacity:0.5;font-size:10px}
.sort-arrow.active{opacity:1;color:var(--accent)}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif}
.pill.active{background:var(--accent);color:#fff}
.pill.inactive{background:var(--surface2);color:var(--text2)}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:18px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:8px 10px;border-radius:7px;font-family:'Inter',sans-serif}
.modal-field textarea{resize:vertical;min-height:70px}
.modal-field input::placeholder,.modal-field textarea::placeholder{color:var(--text3)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.modal-btns button{flex:1;padding:9px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500}
.modal-cancel{background:transparent;border:1px solid var(--border);color:var(--text2)}
.modal-save{background:var(--accent);border:none;color:#fff}
/* Loading */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.8);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text3)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);border-radius:8px;padding:10px 16px;font-size:13px;color:#fff;z-index:300;opacity:0;transform:translateY(8px);transition:all 0.2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--green)}.toast.error{background:var(--red)}
.merchant-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">EV</div>
    <div><div class="logo-name">Evernova</div><div class="logo-sub">Dashboard operativa</div></div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">Principale</div>
    <div class="nav-item active" data-page="overview"><svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.5"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.5"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.3"/></svg>Dashboard</div>
    <div class="nav-item" data-page="invoices"><svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="1" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="5" x2="11" y2="5" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="1.3"/></svg>Fatture</div>
    <div class="nav-item" data-page="clients"><svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M1 13c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" stroke-width="1.3"/><circle cx="12" cy="5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M12 10c1.7.3 3 1.8 3 3.5" stroke="currentColor" stroke-width="1.3"/></svg>Clienti</div>
    <div class="nav-item" data-page="projects"><svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="3" x2="5" y2="13" stroke="currentColor" stroke-width="1.3"/><line x1="11" y1="3" x2="11" y2="13" stroke="currentColor" stroke-width="1.3"/></svg>Progetti</div>
    <div class="nav-item" data-page="expenses"><svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><line x1="8" y1="4.5" x2="8" y2="11.5" stroke="currentColor" stroke-width="1.3"/><line x1="5.5" y1="6.5" x2="10.5" y2="6.5" stroke="currentColor" stroke-width="1.3"/></svg>Spese</div>
    <div class="nav-section">Sistema</div>
    <div class="nav-item" data-page="suppliers"><svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 13V6l6-4 6 4v7" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><rect x="5" y="9" width="2.5" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/><rect x="8.5" y="9" width="2.5" height="4" rx="0.5" stroke="currentColor" stroke-width="1.3"/></svg>Fornitori</div>
    <div class="nav-item" data-page="sync"><svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M13 8A5 5 0 1 1 3.5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><polyline points="3,2 3.5,5 6.5,4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Sync Qonto</div>
  </div>
  <div class="sidebar-bottom">
    <div class="conn-pill">
      <div class="conn-dot" id="connDot"></div>
      <div class="conn-text" id="connText">Connessione...</div>
      <div class="conn-link" onclick="doSync()" style="cursor:pointer">Sync</div>
    </div>
  </div>
</nav>
<div class="main">
  <div class="topbar">
    <div><div id="breadcrumbEl"></div><div id="topbarSub" style="font-size:12px;color:var(--text3);margin-top:1px"></div></div>
    <div class="topbar-right" id="topbarActions"></div>
  </div>
  <div class="content" id="mainContent">
    <div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:14px">
      <div class="spinner"></div>
      <div style="font-size:13px;color:var(--text3)">Caricamento dati...</div>
    </div>
  </div>
</div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div class="loading-text" id="loadingText">Caricamento...</div></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div class="modal-sub" id="modalSub"></div>
    <div id="modalBody"></div>
    <div class="modal-btns"><button class="modal-cancel" onclick="closeModal()">Annulla</button><button class="modal-save" id="modalSaveBtn" onclick="execModalSave()">Salva</button></div>
  </div>
</div>
<script>
const API='https://script.google.com/macros/s/AKfycbyYt69mZlnb4E8WSu_vfitohkijiMr2OVAoh3FmERGEE9mMU28zDAIINDJq-0nVJJYIsw/exec';
let DB={clienti:[],fatture:[],progetti:[],costi:[],spese:[],fornitori:[],goals:[],saldo:{balance:0}};
let currentPage='overview',detailCtx={type:null,id:null},invFilter='all';
let selectMode=false,selectedClients=new Set();
let filters={clients:{q:''},invoices:{q:'',anno:''},expenses:{q:'',anno:'',cat:''},projects:{q:'',stato:''}};
let charts={},modalSaveFn=null;
let invSort={col:'data',dir:'desc'};
let revYear='';

// ── AVATAR COLORS ────────────────────────────────────────────
const COLORS=[['#EEF2FF','#4F46E5'],['#FEF3C7','#D97706'],['#DCFCE7','#16A34A'],['#FEE2E2','#DC2626'],['#DBEAFE','#2563EB'],['#F3E8FF','#9333EA'],['#FFF7ED','#EA580C'],['#ECFDF5','#059669']];
function avatarColor(n){return COLORS[(n||'').charCodeAt(0)%COLORS.length];}
function initials(n){return (n||'??').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');}

// ── NOME CLIENT ──────────────────────────────────────────────
function getNome(cl){
  if(!cl)return '—';
  const n=String(cl.nome||'').trim();
  if(!n||n==='Cliente Qonto'||/^[0-9a-f]{8}-[0-9a-f]{4}-/i.test(n)){
    const t=String(cl.tipo||'').trim();
    if(t&&t!=='Cliente Qonto'&&!/^[0-9a-f]{8}/.test(t))return t;
    return n||'Cliente';
  }
  return n;
}

// ── API ──────────────────────────────────────────────────────
const fmtEur=n=>'€'+Number(n||0).toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtDate=s=>s?new Date(s).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'2-digit'}):'—';
const uid=()=>'ID_'+Date.now()+'_'+Math.random().toString(36).substring(2,6);
const clientById=id=>DB.clienti.find(x=>String(x.id)===String(id));
const clientName=id=>{const c=clientById(id);return c?getNome(c):'—';};
const clientInvs=id=>DB.fatture.filter(i=>String(i.clienteId)===String(id));
const clientProjs=id=>DB.progetti.filter(p=>String(p.clienteId)===String(id));
const projCosts=id=>DB.costi.filter(c=>String(c.progettoId)===String(id));
const fornSpese=id=>DB.spese.filter(e=>String(e.fornitoreId)===String(id));
const projCostTotal=id=>projCosts(id).reduce((s,c)=>s+Number(c.importo||0),0);
const projMargin=p=>Number(p.budget||0)-projCostTotal(p.id);

function getStatoEffettivo(inv){
  if(!inv)return'draft';
  const s=String(inv.stato||'draft');
  if(s==='paid'||s==='draft'||s==='annullata')return s;
  if(inv.scadenza){const sc=new Date(inv.scadenza);const oggi=new Date();oggi.setHours(0,0,0,0);if(sc<oggi)return'overdue';}
  return'pending';
}

const statusBadge={paid:'<span class="badge b-paid">Pagata</span>',pending:'<span class="badge b-pending">In attesa</span>',draft:'<span class="badge b-draft">Bozza</span>',overdue:'<span class="badge b-overdue">Scaduta</span>',annullata:'<span class="badge b-draft">Annullata</span>'};
const projBadge={active:'<span class="badge b-active">Attivo</span>',paused:'<span class="badge b-paused">In pausa</span>',done:'<span class="badge b-done">Completato</span>',proposal:'<span class="badge b-proposal">Proposta</span>'};
const catColors={Software:'#4F46E5',Attrezzatura:'#EA580C',Marketing:'#D97706',Trasferta:'#DC2626',trasferta:'#DC2626',noleggio:'#D97706',software:'#4F46E5',Formazione:'#2563EB',Collaboratori:'#9333EA',Banca:'#6B7280',Tasse:'#DC2626',Ristorazione:'#D97706',Varie:'#9CA3AF',Utenze:'#2563EB',Altro:'#9CA3AF'};

async function apiGet(action,params={}){const qs=new URLSearchParams({action,...params}).toString();const res=await fetch(`${API}?${qs}`);if(!res.ok)throw new Error('HTTP '+res.status);return res.json();}
async function apiPost(action,data){const res=await fetch(`${API}?action=${action}`,{method:'POST',body:JSON.stringify(data)});if(!res.ok)throw new Error('HTTP '+res.status);return res.json();}

function normalizeClient(cl){
  const raw=String(cl.nome||'').trim(),tipo=String(cl.tipo||'').trim();
  const isGeneric=!raw||raw==='Cliente Qonto'||/^[0-9a-f]{8}-[0-9a-f]{4}-/i.test(raw);
  if(isGeneric&&tipo&&tipo!=='Cliente Qonto'&&!/^[0-9a-f]{8}/.test(tipo)){cl.nome=tipo;return cl;}
  return cl;
}

async function loadAll(){
  try{
    const data=await apiGet('all');
    DB.clienti=(data.clienti||[]).map(normalizeClient);
    DB.fatture=(data.fatture||[]).sort((a,b)=>(b.data||'').localeCompare(a.data||''));DB.progetti=data.progetti||[];
    DB.costi=data.costi||[];DB.spese=data.spese||[];
    DB.fornitori=data.fornitori||[];
    DB.goals=data.goals||[];DB.saldo=data.saldo||{balance:0};
    setConn('live','Qonto connesso');return true;
  }catch(e){setConn('error','Errore connessione');toast('Errore: '+e.message,'error');return false;}
}
async function save(action,data){showLoading('Salvataggio...');try{const res=await apiPost(action,data);if(res.error)throw new Error(res.error);await loadAll();toast('Salvato ✓','success');return res;}catch(e){toast('Errore: '+e.message,'error');throw e;}finally{hideLoading();}}
async function del(action,id){showLoading('Eliminazione...');try{const res=await apiPost(action,{id});if(res.error)throw new Error(res.error);await loadAll();toast('Eliminato','success');}catch(e){toast('Errore: '+e.message,'error');}finally{hideLoading();}}
async function doSync(){showLoading('Sincronizzazione Qonto...');try{const res=await apiGet('sync');await loadAll();toast('Sync OK — clienti:'+res.clientiImportati+' fatture:'+res.fattureImportate+' spese:'+res.speseImportate,'success');render();}catch(e){toast('Errore sync: '+e.message,'error');}finally{hideLoading();}}

function setConn(t,tx){document.getElementById('connDot').className='conn-dot'+(t==='live'?' live':t==='error'?' error':'');document.getElementById('connText').textContent=tx;}
function showLoading(t=''){document.getElementById('loadingText').textContent=t;document.getElementById('loadingOverlay').classList.add('show');}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show');}
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(type?' '+type:'');setTimeout(()=>el.className='toast',3500);}
function openModal(title,sub,body,saveFn,saveLabel='Salva'){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalSub').textContent=sub||'';
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalSaveBtn').textContent=saveLabel;
  document.getElementById('modalSaveBtn').style.cssText='';
  modalSaveFn=saveFn;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');modalSaveFn=null;}
function execModalSave(){if(modalSaveFn)modalSaveFn();}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}

// ── NAV ──────────────────────────────────────────────────────
document.querySelectorAll('.nav-item[data-page]').forEach(el=>el.addEventListener('click',()=>navTo(el.dataset.page)));
function navTo(page){currentPage=page;detailCtx={type:null,id:null};selectMode=false;selectedClients=new Set();document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));document.querySelector('.nav-item[data-page="'+page+'"]')?.classList.add('active');render();}
function showDetail(type,id){detailCtx={type,id};render();}
function backToList(){detailCtx={type:null,id:null};render();}

function render(){
  destroyCharts();
  const c=document.getElementById('mainContent');
  if(detailCtx.type==='client'){renderClientDetail(detailCtx.id,c);return;}
  if(detailCtx.type==='project'){renderProjectDetail(detailCtx.id,c);return;}
  setBreadcrumb();setTopActions();
  if(currentPage==='overview')renderOverview(c);
  else if(currentPage==='invoices')renderInvoices(c);
  else if(currentPage==='clients')renderClients(c);
  else if(currentPage==='projects')renderProjects(c);
  else if(currentPage==='expenses')renderExpenses(c);
  else if(currentPage==='suppliers')renderSuppliers(c);
  else if(currentPage==='sync')renderSync(c);
}

function setBreadcrumb(){
  const titles={overview:'Dashboard',invoices:'Fatture',clients:'Clienti',projects:'Progetti',expenses:'Spese',suppliers:'Fornitori',sync:'Sync Qonto'};
  const subs={overview:'Panoramica del tuo business',invoices:'Gestione fatturazione',clients:'Anagrafica clienti',projects:'Progetti e marginalità',expenses:'Costi e spese',suppliers:'Rubrica fornitori',sync:'Sincronizzazione Qonto'};
  const el=document.getElementById('breadcrumbEl'),sub=document.getElementById('topbarSub');
  if(detailCtx.type==='client'){
    const cl=clientById(detailCtx.id);
    el.innerHTML='<span class="breadcrumb" onclick="backToList()">Clienti</span><span class="sep">/</span><span style="font-size:15px;font-weight:600;color:var(--text)">'+(cl?getNome(cl):'')+'</span>';
    if(sub)sub.textContent='Scheda cliente';
  }else if(detailCtx.type==='project'){
    const p=DB.progetti.find(x=>String(x.id)===String(detailCtx.id));
    el.innerHTML='<span class="breadcrumb" onclick="backToList()">Progetti</span><span class="sep">/</span><span style="font-size:15px;font-weight:600;color:var(--text)">'+(p?.nome||'')+'</span>';
    if(sub)sub.textContent='Dettaglio progetto';
  }else{
    el.innerHTML='<span style="font-size:18px;font-weight:600;color:var(--text)">'+(titles[currentPage]||'')+'</span>';
    if(sub)sub.textContent=subs[currentPage]||'';
  }
}
function setTopActions(){
  const el=document.getElementById('topbarActions');
  if(detailCtx.type){el.innerHTML='';return;}
  if(currentPage==='suppliers')el.innerHTML='<button class="btn-primary" onclick="openNewFornModal()">+ Nuovo fornitore</button>';
  else if(currentPage==='clients')el.innerHTML='<button class="btn-primary" onclick="openNewClientModal()">+ Nuovo cliente</button>';
  else if(currentPage==='projects')el.innerHTML='<button class="btn-primary" onclick="openNewProjectModal()">+ Nuovo progetto</button>';
  else if(currentPage==='invoices')el.innerHTML='<button class="btn-ghost" style="margin-right:4px" onclick="doSync()">↺ Sync</button><button class="btn-primary" onclick="openNewInvoiceModal()">+ Nuova fattura</button>';
  else el.innerHTML='<button class="btn-ghost" onclick="init()">↺ Aggiorna</button>';
}

function renderRevChart(year){
  revYear=year;
  const pillsEl=document.getElementById('revYearPills');
  if(pillsEl){const revAnni=[...new Set(DB.fatture.filter(i=>getStatoEffettivo(i)==='paid').map(i=>(i.data||'').substring(0,4)).filter(Boolean))].sort().reverse();pillsEl.innerHTML=[['','Tutti'],...revAnni.map(y=>[y,y])].map(([v,l])=>`<button class="pill ${revYear===v?'active':'inactive'}" style="font-size:11px;padding:4px 10px" onclick="revYear='${v}';renderRevChart('${v}')">${l}</button>`).join('');}
  if(charts.rev){try{charts.rev.destroy();}catch(e){}delete charts.rev;}
  const fatturePagate=DB.fatture.filter(i=>{
    if(getStatoEffettivo(i)!=='paid')return false;
    if(year&&!(i.data||'').startsWith(year))return false;
    return true;
  });
  const byClient={};
  fatturePagate.forEach(i=>{const n=i.clienteNome||clientName(i.clienteId);byClient[n]=(byClient[n]||0)+Number(i.importo||0);});
  const sorted=Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const trunc=(s,n=24)=>s.length>n?s.substring(0,n)+'…':s;
  if(!sorted.length)return;
  charts.rev=new Chart(document.getElementById('revChart'),{
    type:'bar',
    data:{labels:sorted.map(e=>trunc(e[0])),datasets:[{data:sorted.map(e=>e[1]),backgroundColor:'#4F46E5',borderRadius:[0,6,6,0],borderSkipped:false,barThickness:22}]},
    options:{
      responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmtEur(ctx.raw)}}},
      onClick:(evt,els)=>{
        if(!els.length)return;
        const nome=sorted[els[0].index][0];
        filters.invoices.q=nome;
        filters.invoices.anno=year||'';
        navTo('invoices');
      },
      onHover:(evt,els)=>{if(evt.native)evt.native.target.style.cursor=els.length?'pointer':'default';},
      scales:{
        x:{ticks:{font:{size:11},color:'#9CA3AF',callback:v=>'€'+Number(v).toLocaleString('it-IT')},grid:{color:'#F3F4F6'},border:{display:false}},
        y:{ticks:{font:{size:12,weight:'500'},color:'#374151'},grid:{display:false},border:{display:false}}
      }
    }
  });
}

// ── INVOICES ─────────────────────────────────────────────────
function renderInvoices(c){
  const all=DB.fatture;
  const allAnni=[...new Set(all.map(i=>(i.data||'').substring(0,4)).filter(Boolean))].sort().reverse();

  function filteredInv(){
    const q=(filters.invoices.q||'').toLowerCase();
    const annoF=filters.invoices.anno||'';
    let r=invFilter==='all'?[...all]:all.filter(i=>getStatoEffettivo(i)===invFilter);
    if(q)r=r.filter(i=>(i.clienteNome||'').toLowerCase().includes(q)||(i.descrizione||'').toLowerCase().includes(q));
    if(annoF)r=r.filter(i=>(i.data||'').startsWith(annoF));
    // Apply sort
    const col=invSort.col,dir=invSort.dir;
    r.sort((a,b)=>{
      let va=col==='importo'?Number(a[col]||0):String(a[col]||'');
      let vb=col==='importo'?Number(b[col]||0):String(b[col]||'');
      if(col==='stato'){va=getStatoEffettivo(a);vb=getStatoEffettivo(b);}
      if(col==='clienteNome'){va=a.clienteNome||clientName(a.clienteId);vb=b.clienteNome||clientName(b.clienteId);}
      if(typeof va==='number')return dir==='asc'?va-vb:vb-va;
      return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    });
    return r;
  }

  function renderTable(){
    const filtered=filteredInv();
    const cnt=document.getElementById('invCount');
    if(cnt)cnt.textContent=filtered.length+' / '+all.length+' fatture';
    const tbody=document.getElementById('invTbody');
    if(!tbody)return;
    const lmap={paid:'Pagata',pending:'In attesa',draft:'Bozza',overdue:'Scaduta',annullata:'Annullata'};
    const bmap={paid:'b-paid',pending:'b-pending',draft:'b-draft',overdue:'b-overdue',annullata:'b-draft'};
    tbody.innerHTML=filtered.length?filtered.map(inv=>`<tr onclick="openInvDetail('${inv.id}')">
      <td><div class="td-name">${inv.clienteNome||clientName(inv.clienteId)}</div></td>
      <td style="color:var(--text2)">${inv.descrizione||''}</td>
      <td style="color:var(--text3)">${fmtDate(inv.data)}</td>
      <td><span style="font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:4px">${inv.fonte==='qonto'?'Qonto':'Manuale'}</span></td>
      <td>${statusBadge[getStatoEffettivo(inv)]||''}</td>
      <td class="td-mono" style="text-align:right">${fmtEur(inv.importo)}</td>
    </tr>`).join(''):'<tr><td colspan="6" style="color:var(--text3);text-align:center;padding:24px">Nessuna fattura trovata.</td></tr>';
  }

  function renderPills(){
    const el=document.getElementById('invPills');
    if(!el)return;
    const labels={all:'Tutte',paid:'Pagate',pending:'In attesa',draft:'Bozze',overdue:'Scadute'};
    el.innerHTML=Object.keys(labels).map(f=>`<button class="pill ${invFilter===f?'active':'inactive'}" onclick="setInvFilter('${f}')">${labels[f]}</button>`).join('');
  }

  c.innerHTML=`

function sortInv(col){
  if(invSort.col===col){invSort.dir=invSort.dir==='asc'?'desc':'asc';}
  else{invSort.col=col;invSort.dir=col==='data'||col==='importo'?'desc':'asc';}

  const c=document.getElementById('mainContent');
  if(c)renderInvoices(c);
}

function setInvFilter(f){
  invFilter=f;
  // Re-render pills
  const labels={all:'Tutte',paid:'Pagate',pending:'In attesa',draft:'Bozze',overdue:'Scadute'};
  const el=document.getElementById('invPills');
  if(el)el.innerHTML=Object.keys(labels).map(k=>`<button class="pill ${invFilter===k?'active':'inactive'}" onclick="setInvFilter('${k}')">${labels[k]}</button>`).join('');
  // Re-render table
  const all=DB.fatture;
  function filteredInv(){
    const q=(filters.invoices.q||'').toLowerCase();
    const annoF=filters.invoices.anno||'';
    let r=invFilter==='all'?[...all]:all.filter(i=>getStatoEffettivo(i)===invFilter);
    if(q)r=r.filter(i=>(i.clienteNome||'').toLowerCase().includes(q)||(i.descrizione||'').toLowerCase().includes(q));
    if(annoF)r=r.filter(i=>(i.data||'').startsWith(annoF));
    r.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
    return r;
  }
  const filtered=filteredInv();
  const cnt=document.getElementById('invCount');
  if(cnt)cnt.textContent=filtered.length+' / '+all.length+' fatture';
  const tbody=document.getElementById('invTbody');
  if(!tbody)return;
  const lmap={paid:'Pagata',pending:'In attesa',draft:'Bozza',overdue:'Scaduta',annullata:'Annullata'};
  tbody.innerHTML=filtered.length?filtered.map(inv=>`<tr onclick="openInvDetail('${inv.id}')">
    <td><div class="td-name">${inv.clienteNome||clientName(inv.clienteId)}</div></td>
    <td style="color:var(--text2)">${inv.descrizione||''}</td>
    <td style="color:var(--text3)">${fmtDate(inv.data)}</td>
    <td><span style="font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:4px">${inv.fonte==='qonto'?'Qonto':'Manuale'}</span></td>
    <td>${statusBadge[getStatoEffettivo(inv)]||''}</td>
    <td class="td-mono" style="text-align:right">${fmtEur(inv.importo)}</td>
  </tr>`).join(''):'<tr><td colspan="6" style="color:var(--text3);text-align:center;padding:24px">Nessuna fattura trovata.</td></tr>';
}

function toggleSelectMode(){
  selectMode=!selectMode;selectedClients=new Set();
  document.querySelectorAll('[id^="chk_"]').forEach(el=>{el.style.display=selectMode?'flex':'none';el.innerHTML='';});
  document.querySelectorAll('[id^="cc_"]').forEach(el=>el.classList.remove('selected'));
  const actions=document.getElementById('clActions');
  if(actions)actions.innerHTML=selectMode
    ?'<button class="btn-ghost" style="font-size:12px" onclick="toggleSelectMode()">Annulla</button><button class="btn-danger" style="font-size:12px" onclick="deleteSelected()">Elimina selezionati (<span id="selCount">0</span>)</button>'
    :'<button class="btn-ghost" style="font-size:12px" onclick="toggleSelectMode()">Seleziona per eliminare</button>';
}
function clientCardClick(e,id){
  if(!selectMode){showDetail('client',id);return;}
  e.stopPropagation();
  const chk=document.getElementById('chk_'+id),card=document.getElementById('cc_'+id);
  if(selectedClients.has(id)){selectedClients.delete(id);if(chk)chk.innerHTML='';if(card)card.classList.remove('selected');}
  else{selectedClients.add(id);if(chk)chk.innerHTML='<svg width="11" height="11" viewBox="0 0 11 11"><polyline points="1,5.5 4,8.5 10,2" stroke="#4F46E5" stroke-width="2" fill="none" stroke-linecap="round"/></svg>';if(card)card.classList.add('selected');}
  const cnt=document.getElementById('selCount');if(cnt)cnt.textContent=selectedClients.size;
}
function deleteSelected(){
  if(!selectedClients.size)return;
  const ids=[...selectedClients];
  openModal('Elimina clienti',ids.length+' clienti selezionati','<div style="font-size:13px;color:var(--text2)">Verranno eliminati '+ids.length+' clienti.</div>',
    async()=>{closeModal();showLoading('Eliminazione...');for(const id of ids)await apiPost('deleteClient',{id});await loadAll();hideLoading();toast(ids.length+' clienti eliminati','success');selectMode=false;render();},'Elimina');
}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:var(--surface2);border-radius:8px;padding:12px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">Totale pagato</div>
        <div style="font-size:22px;font-weight:700;color:var(--red)">${fmtEur(totale)}</div>
      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">Transazioni</div>
        <div style="font-size:22px;font-weight:700">${spese.length}</div>
      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">Email</div>

      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">Tariffa</div>
        <div style="font-size:13px;font-weight:500;color:var(--accent)">${f.tariffa?fmtEur(f.tariffa)+'/g':'—'}</div>
      </div>
    </div>
    ${spese.length?`
    <div style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Transazioni</div>
    <div style="max-height:240px;overflow-y:auto">
      ${spese.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(e=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500;color:var(--text)">${e.descrizione||''}</div>
            <div style="font-size:11px;color:var(--text3)">${e.categoria||''} · ${fmtDate(e.data)}</div>
          </div>
          <div style="font-size:13px;font-weight:600;color:var(--red)">${fmtEur(e.importo)}</div>

    <div style="display:flex;gap:8px;margin-top:16px;border-top:1px solid var(--border);padding-top:14px">
      <button class="btn-ghost" style="flex:1" onclick="closeModal();openEditFornModal('${id}')">✎ Modifica</button>

  document.getElementById('modalSaveBtn').textContent='Chiudi';

  document.getElementById('modalOverlay').classList.add('open');
}

function openNewFornModal(){
  openModal('Nuovo fornitore','',`
    <div class="modal-row">
      <div class="modal-field"><label>Nome</label><input id="mf_fname" placeholder="es. Marco Rossi"></div>
      <div class="modal-field"><label>Categoria</label><select id="mf_fcat">${FORN_CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Email</label><input id="mf_femail" type="email"></div>
      <div class="modal-field"><label>Telefono</label><input id="mf_ftel"></div>
    </div>
    <div class="modal-field"><label>Tariffa giornaliera €</label><input id="mf_ftariffa" type="number" placeholder="0"></div>
    <div class="modal-field"><label>Note</label><textarea id="mf_fnote" placeholder="Specializzazioni, attrezzatura, disponibilità..."></textarea></div>`,
  async()=>{
    const nome=document.getElementById('mf_fname').value.trim();
    if(!nome)return;
    await save('saveForn',{
      id:uid(),nome,
      categoria:document.getElementById('mf_fcat').value,
      email:document.getElementById('mf_femail').value,
      tel:document.getElementById('mf_ftel').value,
      tariffa:parseFloat(document.getElementById('mf_ftariffa').value)||0,
      note:document.getElementById('mf_fnote').value,
    });
    closeModal();render();
  });
}

function openEditFornModal(id){
  const f=DB.fornitori.find(x=>String(x.id)===String(id));
  if(!f)return;
  openModal('Modifica fornitore',f.nome,`
    <div class="modal-row">
      <div class="modal-field"><label>Nome</label><input id="mf_fname" value="${f.nome||''}"></div>
      <div class="modal-field"><label>Categoria</label><select id="mf_fcat">${FORN_CATS.map(c=>`<option ${f.categoria===c?'selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Email</label><input id="mf_femail" value="${f.email||''}"></div>
      <div class="modal-field"><label>Telefono</label><input id="mf_ftel" value="${f.tel||''}"></div>
    </div>
    <div class="modal-field"><label>Tariffa giornaliera €</label><input id="mf_ftariffa" type="number" value="${f.tariffa||0}"></div>
    <div class="modal-field"><label>Note</label><textarea id="mf_fnote">${f.note||''}</textarea></div>`,
  async()=>{
    f.nome=document.getElementById('mf_fname').value.trim()||f.nome;
    f.categoria=document.getElementById('mf_fcat').value;
    f.email=document.getElementById('mf_femail').value;
    f.tel=document.getElementById('mf_ftel').value;
    f.tariffa=parseFloat(document.getElementById('mf_ftariffa').value)||0;
    f.note=document.getElementById('mf_fnote').value;
    await save('saveForn',f);closeModal();render();
  });
}

async function deleteForn(id){
  if(!confirm('Eliminare questo fornitore?'))return;
  await del('deleteForn',id);render();
}

function renderSync(c){
  c.innerHTML=`<div class="card" style="max-width:520px">
    <div class="card-header"><div><div class="card-title">Sincronizzazione Qonto</div><div class="card-sub">Sync automatico ogni notte alle 3:00</div></div></div>
    <button class="btn-primary" onclick="doSync()">↺ Sincronizza ora</button>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
      <div class="info-field"><div class="info-label">Clienti</div><div style="font-size:22px;font-weight:700">${DB.clienti.length}</div></div>
      <div class="info-field"><div class="info-label">Fatture</div><div style="font-size:22px;font-weight:700">${DB.fatture.length}</div></div>
      <div class="info-field"><div class="info-label">Spese</div><div style="font-size:22px;font-weight:700">${DB.spese.length}</div></div>
    </div>
  </div>`;
}

// ── MODALS ───────────────────────────────────────────────────
function openNewClientModal(){openModal('Nuovo cliente','',`<div class="modal-row"><div class="modal-field"><label>Nome</label><input id="mf_cname"></div><div class="modal-field"><label>Tipo</label><select id="mf_ctype"><option>Retainer video</option><option>AI/CRM</option><option>Video spot</option><option>Altro</option></select></div></div><div class="modal-row"><div class="modal-field"><label>Email</label><input id="mf_cemail"></div><div class="modal-field"><label>Tel</label><input id="mf_ctel"></div></div><div class="modal-row"><div class="modal-field"><label>P.IVA</label><input id="mf_cpiva"></div><div class="modal-field"><label>Città</label><input id="mf_ccity"></div></div>`,async()=>{const nome=document.getElementById('mf_cname').value.trim();if(!nome)return;await save('saveClient',{id:uid(),nome,tipo:document.getElementById('mf_ctype').value,email:document.getElementById('mf_cemail').value,tel:document.getElementById('mf_ctel').value,piva:document.getElementById('mf_cpiva').value,citta:document.getElementById('mf_ccity').value,note:''});closeModal();render();});}
function openEditClientModal(id){const cl=clientById(id);if(!cl)return;openModal('Modifica cliente',getNome(cl),`<div class="modal-field"><label>Nome</label><input id="mf_cname" value="${getNome(cl)}"></div><div class="modal-row"><div class="modal-field"><label>Email</label><input id="mf_cemail" value="${cl.email||''}"></div><div class="modal-field"><label>Tel</label><input id="mf_ctel" value="${cl.tel||''}"></div></div><div class="modal-row"><div class="modal-field"><label>P.IVA</label><input id="mf_cpiva" value="${cl.piva||''}"></div><div class="modal-field"><label>Città</label><input id="mf_ccity" value="${cl.citta||''}"></div></div>`,async()=>{cl.nome=document.getElementById('mf_cname').value.trim()||cl.nome;cl.email=document.getElementById('mf_cemail').value;cl.tel=document.getElementById('mf_ctel').value;cl.piva=document.getElementById('mf_cpiva').value;cl.citta=document.getElementById('mf_ccity').value;await save('saveClient',cl);closeModal();showDetail('client',id);});}
function openNewInvoiceModal(){openModal('Nuova fattura','',`<div class="modal-field"><label>Cliente</label><select id="mf_iclient">${DB.clienti.map(c=>`<option value="${c.id}">${getNome(c)}</option>`).join('')}</select></div><div class="modal-field"><label>Descrizione</label><input id="mf_idesc"></div><div class="modal-row"><div class="modal-field"><label>Importo €</label><input id="mf_iamt" type="number"></div><div class="modal-field"><label>Stato</label><select id="mf_istatus"><option value="draft">Bozza</option><option value="pending">In attesa</option><option value="paid">Pagata</option></select></div></div><div class="modal-field"><label>Data</label><input id="mf_idate" type="date" value="${new Date().toISOString().split('T')[0]}"></div>`,async()=>{const a=parseFloat(document.getElementById('mf_iamt').value),d=document.getElementById('mf_idesc').value.trim();if(!a||!d)return;const cid=document.getElementById('mf_iclient').value;await save('saveInvoice',{id:uid(),clienteId:cid,clienteNome:clientName(cid),descrizione:d,importo:a,stato:document.getElementById('mf_istatus').value,data:document.getElementById('mf_idate').value,fonte:'manuale'});closeModal();render();});}
function openNewInvoiceForClient(clientId){openModal('Nuova fattura',clientName(clientId),`<div class="modal-field"><label>Descrizione</label><input id="mf_idesc"></div><div class="modal-row"><div class="modal-field"><label>Importo €</label><input id="mf_iamt" type="number"></div><div class="modal-field"><label>Stato</label><select id="mf_istatus"><option value="draft">Bozza</option><option value="pending">In attesa</option><option value="paid">Pagata</option></select></div></div>`,async()=>{const a=parseFloat(document.getElementById('mf_iamt').value),d=document.getElementById('mf_idesc').value.trim();if(!a||!d)return;await save('saveInvoice',{id:uid(),clienteId:clientId,clienteNome:clientName(clientId),descrizione:d,importo:a,stato:document.getElementById('mf_istatus').value,data:new Date().toISOString().split('T')[0],fonte:'manuale'});closeModal();showDetail('client',clientId);});}
function openNewProjectModal(){openModal('Nuovo progetto','',`<div class="modal-field"><label>Nome</label><input id="mf_pname"></div><div class="modal-row"><div class="modal-field"><label>Cliente</label><select id="mf_pclient">${DB.clienti.map(c=>`<option value="${c.id}">${getNome(c)}</option>`).join('')}</select></div><div class="modal-field"><label>Tipo</label><select id="mf_ptype"><option>Video</option><option>AI/CRM</option><option>Video retainer</option><option>Altro</option></select></div></div><div class="modal-row"><div class="modal-field"><label>Budget €</label><input id="mf_pbudget" type="number"></div><div class="modal-field"><label>Stato</label><select id="mf_pstatus"><option value="proposal">Proposta</option><option value="active">Attivo</option><option value="paused">In pausa</option></select></div></div><div class="modal-row"><div class="modal-field"><label>Data inizio</label><input id="mf_pstart" type="date" value="${new Date().toISOString().split('T')[0]}"></div><div class="modal-field"><label>Data fine</label><input id="mf_pend" type="date"></div></div><div class="modal-field"><label>Note</label><textarea id="mf_pnotes"></textarea></div>`,async()=>{const nome=document.getElementById('mf_pname').value.trim();if(!nome)return;await save('saveProject',{id:uid(),nome,clienteId:document.getElementById('mf_pclient').value,tipo:document.getElementById('mf_ptype').value,stato:document.getElementById('mf_pstatus').value,dataInizio:document.getElementById('mf_pstart').value,dataFine:document.getElementById('mf_pend').value,budget:parseFloat(document.getElementById('mf_pbudget').value)||0,avanzamento:0,responsabile:'Riccardo',note:document.getElementById('mf_pnotes').value});closeModal();render();});}
function openEditProjectModal(id){const p=DB.progetti.find(x=>String(x.id)===String(id));if(!p)return;openModal('Modifica progetto',p.nome,`<div class="modal-row"><div class="modal-field"><label>Budget €</label><input id="mf_pbudget" type="number" value="${p.budget||0}"></div><div class="modal-field"><label>Stato</label><select id="mf_pstatus"><option value="proposal" ${p.stato==='proposal'?'selected':''}>Proposta</option><option value="active" ${p.stato==='active'?'selected':''}>Attivo</option><option value="paused" ${p.stato==='paused'?'selected':''}>In pausa</option><option value="done" ${p.stato==='done'?'selected':''}>Completato</option></select></div></div><div class="modal-row"><div class="modal-field"><label>Avanzamento %</label><input id="mf_pprog" type="number" min="0" max="100" value="${p.avanzamento||0}"></div><div class="modal-field"><label>Data fine</label><input id="mf_pend" type="date" value="${p.dataFine||''}"></div></div>`,async()=>{p.budget=parseFloat(document.getElementById('mf_pbudget').value)||p.budget;p.stato=document.getElementById('mf_pstatus').value;p.avanzamento=parseInt(document.getElementById('mf_pprog').value)||p.avanzamento;p.dataFine=document.getElementById('mf_pend').value;await save('saveProject',p);closeModal();showDetail('project',id);});}
function openAddCostModal(projId){openModal('Aggiungi costo','',`<div class="modal-field"><label>Descrizione</label><input id="mf_cdesc"></div><div class="modal-row"><div class="modal-field"><label>Importo €</label><input id="mf_camt" type="number"></div><div class="modal-field"><label>Categoria</label><select id="mf_ccat"><option value="Trasferta">Trasferta</option><option value="noleggio">Noleggio</option><option value="software">Software</option><option value="Collaboratori">Collaboratori</option><option value="Altro">Altro</option></select></div></div><div class="modal-field"><label>Data</label><input id="mf_cdate" type="date" value="${new Date().toISOString().split('T')[0]}"></div>`,async()=>{const desc=document.getElementById('mf_cdesc').value.trim(),amt=parseFloat(document.getElementById('mf_camt').value);if(!desc||!amt)return;await save('saveCost',{id:uid(),progettoId:projId,descrizione:desc,categoria:document.getElementById('mf_ccat').value,importo:amt,data:document.getElementById('mf_cdate').value});closeModal();showDetail('project',projId);});}
function editGoal(i){const g=DB.goals[i];openModal('Aggiorna obiettivo',g.label,`<div class="modal-row"><div class="modal-field"><label>Valore attuale</label><input id="mf_gcur" type="number" value="${g.current}"></div><div class="modal-field"><label>Target</label><input id="mf_gtgt" type="number" value="${g.target}"></div></div>`,async()=>{g.current=parseFloat(document.getElementById('mf_gcur').value)||g.current;g.target=parseFloat(document.getElementById('mf_gtgt').value)||g.target;await save('saveGoals',{goals:DB.goals});closeModal();render();});}

async function saveClientNotes(id,val){const cl=clientById(id);if(cl){cl.note=val;await save('saveClient',cl);}}

document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
window.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

async function init(){
  setConn('','Connessione...');
  const ok=await loadAll();
  if(ok)render();
  else document.getElementById('mainContent').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:14px"><div style="font-size:16px;font-weight:600;color:var(--red)">Errore di connessione</div><button class="btn-primary" style="margin-top:8px" onclick="init()">↺ Riprova</button></div>';
}
init();
</script>
